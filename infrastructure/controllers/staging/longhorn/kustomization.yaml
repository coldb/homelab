apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: longhorn-system
resources:
  - ../../base/longhorn/

patches:
  - target:
      kind: StorageClass
      name: longhorn-(delete|retain)
    patch: |-
      - op: replace
        path: /parameters/numberOfReplicas
        value: "1"

  - target:
      kind: HelmRelease
      name: longhorn
    patch: |-
      - op: replace
        path: /spec/values/defaultSettings/defaultReplicaCount
        value: "1"
