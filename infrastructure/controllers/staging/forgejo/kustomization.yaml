apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: forgejo
resources:
  - ../../base/forgejo/
  - configmap.enc.yaml
  - secrets-admin-user.enc.yaml
  - secrets-db.enc.yaml
  - secrets-runner.enc.yaml

patches:
  - target:
      kind: Ingress
      name: forgejo
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: forgejo-staging.colddev.net
      - op: replace
        path: /spec/tls/0/hosts/0
        value: forgejo-staging.colddev.net

  - target:
      kind: Certificate
      name: forgejo-certificate
    patch: |-
      - op: replace
        path: /spec/dnsNames/0
        value: forgejo-staging.colddev.net

  - target:
      kind: Deployment
      name: forgejo-runner
    patch: |
      - op: replace
        path: /spec/template/spec/initContainers/0/command/2
        value: |
          cat /etc/ssl/certs/ca-certificates.crt /ca-trust/ca.crt > /tmp/ca-bundle.crt
          export SSL_CERT_FILE=/tmp/ca-bundle.crt
          if [ ! -f /data/.runner ]; then
            echo "Registering runner..."
            forgejo-runner create-runner-file \
              --instance https://forgejo-staging.colddev.net \
              --secret "${RUNNER_SECRET}" \
              --name "colddev-runner"
            mv .runner /data/.runner
          else
            echo "Runner already registered"
          fi

  - target:
      kind: PersistentVolumeClaim
      name: forgejo-data
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 2Gi

  - target:
      kind: PersistentVolumeClaim
      name: forgejo-runner-docker-cache
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 2Gi
