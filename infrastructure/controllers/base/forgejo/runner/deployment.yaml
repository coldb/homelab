apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  labels:
    app.kubernetes.io/component: runner
    app.kubernetes.io/instance: forgejo-runner
    app.kubernetes.io/name: forgejo-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-runner
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: forgejo-runner
        app.kubernetes.io/component: runner
        app.kubernetes.io/instance: forgejo-runner
        app.kubernetes.io/name: forgejo-runner
        policy-type: app
    spec:
      containers:
        - args:
            - --tls=false
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          image: docker:29-dind
          name: docker
          ports:
            - containerPort: 2375
              protocol: TCP
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /var/lib/docker
              name: docker-storage
        - command:
            - sh
            - -c
            - |
              cat /etc/ssl/certs/ca-certificates.crt /ca-trust/ca.crt > /tmp/ca-bundle.crt
              export SSL_CERT_FILE=/tmp/ca-bundle.crt
              echo "Waiting for Docker daemon..."
              while ! wget -q -O- http://localhost:2375/version >/dev/null 2>&1; do
                sleep 1
              done
              echo "Docker is ready!"
              cp /data/.runner .runner
              forgejo-runner daemon --config /config/config.yaml
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2375
          image: data.forgejo.org/forgejo/runner:6.4.0
          name: runner
          volumeMounts:
            - mountPath: /data
              name: runner-data
            - mountPath: /config
              name: config
            - mountPath: /ca-trust
              name: ca-trust
              readOnly: true
      initContainers:
        - command:
            - sh
            - -c
            - |
              cat /etc/ssl/certs/ca-certificates.crt /ca-trust/ca.crt > /tmp/ca-bundle.crt
              export SSL_CERT_FILE=/tmp/ca-bundle.crt
              if [ ! -f /data/.runner ]; then
                echo "Registering runner..."
                cd /tmp
                forgejo-runner register \
                  --instance https://forgejo.colddev.net \
                  --token "${REGISTRATION_TOKEN}" \
                  --name "colddev-runner" \
                  --labels "docker:docker://ghcr.io/catthehacker/ubuntu:act-22.04,ubuntu-latest:docker://ghcr.io/catthehacker/ubuntu:act-22.04" \
                  --no-interactive
                mv /tmp/.runner /data/.runner
              else
                echo "Runner already registered"
              fi
          env:
            # Secret created by the forgejo chart's actions.provisioning flow.
            # Verify name/key against the chart version you deploy.
            - name: REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-actions-general-runner-secret
                  key: token
          image: data.forgejo.org/forgejo/runner:6.4.0
          name: register-runner
          volumeMounts:
            - mountPath: /data
              name: runner-data
            - mountPath: /ca-trust
              name: ca-trust
              readOnly: true
      restartPolicy: Always
      securityContext:
        fsGroup: 1000
      volumes:
        - name: runner-data
          emptyDir: {}
        - name: docker-storage
          persistentVolumeClaim:
            claimName: forgejo-runner-docker-cache
        - name: config
          configMap:
            name: forgejo-runner-config
        - name: ca-trust
          secret:
            secretName: forgejo-ca-tls-secret
            items:
              - key: ca.crt
                path: ca.crt
