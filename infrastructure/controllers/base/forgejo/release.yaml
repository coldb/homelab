apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: forgejo
spec:
  interval: 30m
  chart:
    spec:
      chart: forgejo
      # Chart version — distinct from the forgejo app version the chart ships.
      # Check artifacthub.io/packages/helm/forgejo-helm/forgejo before bumping.
      version: "17.0.0"
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: forgejo
      interval: 12h
  values:
    replicaCount: 1
    strategy:
      type: Recreate

    image:
      rootless: true

    # External CNPG cluster provides postgres — disable bundled DBs/cache.
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false
    redis:
      enabled: false
    redis-cluster:
      enabled: false
    valkey:
      enabled: false
    valkey-cluster:
      enabled: false

    persistence:
      enabled: true
      create: true
      size: 10Gi
      storageClass: longhorn-retain-backup
      accessModes:
        - ReadWriteOnce

    service:
      http:
        type: ClusterIP
        port: 3000
      ssh:
        type: ClusterIP
        port: 2222

    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: forgejo.colddev.net
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: forgejo-ca-tls-secret
          hosts:
            - forgejo.colddev.net

    resources:
      limits:
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 512Mi

    gitea:
      # Overlay secrets inject FORGEJO__* env vars that environment-to-ini
      # bakes into app.ini on start (DB creds/host, server domain/root URL).
      additionalConfigFromEnvs:
        - secretRef:
            name: forgejo-configmap-secret
        - secretRef:
            name: forgejo-db-env-secret

      config:
        service:
          DISABLE_REGISTRATION: true
        security:
          INSTALL_LOCK: true
        database:
          SSL_MODE: disable
        server:
          SSH_PORT: 2222
          SSH_LISTEN_PORT: 2222
          PER_WRITE_TIMEOUT: -1
          PER_WRITE_PER_KB_TIMEOUT: -1
        actions:
          ENABLED: true
          DEFAULT_ACTIONS_URL: https://data.forgejo.org
        packages:
          ENABLED: true

      actions:
        # Chart generates a runner registration token at install time
        # and writes it to a Secret the runner Deployment consumes.
        # Secret name/key are chart-version dependent — verify with
        # `kubectl get secret -n forgejo | grep -i actions` after install.
        provisioning:
          enabled: true
