apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  schedule: "@hourly"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: renovate
              image: renovate/renovate:latest
              args:
                - coldb/homelab
              env:
                - name: NODE_EXTRA_CA_CERTS
                  value: /etc/ssl/colddev/colddev-ca.crt
              envFrom:
                - secretRef:
                    name: renovate-container-env
                - secretRef:
                    name: renovate-host-rules
                - configMapRef:
                    name: renovate-configmap
              volumeMounts:
                - name: colddev-ca
                  mountPath: /etc/ssl/colddev
                  readOnly: true
          volumes:
            - name: colddev-ca
              secret:
                secretName: colddev-ca
          restartPolicy: Never
