apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: forgejo
resources:
  - ../../base/forgejo/
  - configmap.enc.yaml
  - secrets-admin-user.enc.yaml
  - secrets-db.enc.yaml
  - secrets-runner.enc.yaml

patches:
  - target:
      kind: Deployment
      name: forgejo-runner
    patch: |-
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          forgejo-runner: "true"
