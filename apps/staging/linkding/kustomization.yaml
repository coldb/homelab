apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: linkding
resources:
  - ../../base/linkding/
  - cloudflare-secret.enc.yaml
  - ../../../shared/cloudflared/
  - secret.enc.yaml
patches:
  - target:
      kind: PersistentVolumeClaim
      name: linkding-data-pvc
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 500Mi
