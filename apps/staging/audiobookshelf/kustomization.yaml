apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: audiobookshelf
resources:
  - ../../base/audiobookshelf/
  - cloudflare-secret.enc.yaml
  - ../../../shared/cloudflared/
patches:
  - target:
      kind: PersistentVolumeClaim
      name: audiobookshelf-(audiobooks|podcasts|config|metadata)-longhorn-pvc
    patch: |-
      - op: replace
        path: /spec/storageClassName
        value: longhorn-retain
      - op: replace
        path: /spec/resources/requests/storage
        value: 500Mi
