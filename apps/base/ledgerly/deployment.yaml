apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledgerly
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ledgerly
  template:
    metadata:
      labels:
        app: ledgerly
    spec:
      securityContext:
        fsGroup: 101
        runAsUser: 101
        runAsGroup: 101

      imagePullSecrets:
        - name: docker-registry-auth
      containers:
        - name: ledgerly
          image: forgejo.colddev.net/coldb/ledgerly:latest@sha256:172d26de994073d12fd2ce31aefa0c4bf05b9814aeacb6ee6ba6335bfb56b601

          securityContext:
            allowPrivilegeEscalation: false

          imagePullPolicy: Always

          ports:
            - containerPort: 8080
