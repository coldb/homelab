apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledgerly
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ledgerly
  template:
    metadata:
      labels:
        app: ledgerly
    spec:
      securityContext:
        fsGroup: 101
        runAsUser: 101
        runAsGroup: 101

      imagePullSecrets:
        - name: docker-registry-auth
      containers:
        - name: ledgerly
          image: forgejo.colddev.net/coldb/ledgerly:pr-1@sha256:80be0dfc5816f5364ac26a7d3a40a1a3771863b61fc6b275b57ecfcc56092d3f

          securityContext:
            allowPrivilegeEscalation: false

          imagePullPolicy: Always

          envFrom:
            - secretRef:
                name: ledgerly-secret

          ports:
            - containerPort: 8080
