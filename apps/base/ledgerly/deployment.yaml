apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledgerly
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ledgerly
  template:
    metadata:
      labels:
        app: ledgerly
    spec:
      securityContext:
        fsGroup: 101
        runAsUser: 101
        runAsGroup: 101

      imagePullSecrets:
        - name: docker-registry-auth
      containers:
        - name: ledgerly
          image: forgejo.colddev.net/coldb/ledgerly:pr-1@sha256:fb2ff4b317e8128748bc27ecb07fff2042f41e020e3a9c75e7ea20177c8c8517

          securityContext:
            allowPrivilegeEscalation: false

          imagePullPolicy: Always

          envFrom:
            - secretRef:
                name: ledgerly-secret

          ports:
            - containerPort: 8080
