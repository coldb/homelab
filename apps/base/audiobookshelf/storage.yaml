apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audiobookshelf-audiobooks-longhorn-backup-pvc
spec:
  storageClassName: "longhorn-retain-backup"
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

