apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audiobookshelf-audiobooks-longhorn-pvc
spec:
  storageClassName: "longhorn-retain"
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

