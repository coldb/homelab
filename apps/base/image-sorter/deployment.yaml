apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-sorter
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: image-sorter
  template:
    metadata:
      labels:
        app: image-sorter
    spec:
      imagePullSecrets:
        - name: docker-registry-auth
      containers:
        - name: image-sorter
          image: forgejo.colddev.net/coldb/image-sorter:latest@sha256:461ad628646f1391d28a31f64b926fdbf19b7a144835cd991da5346aaa7595a0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
