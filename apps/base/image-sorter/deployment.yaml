apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-sorter
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: image-sorter
  template:
    metadata:
      labels:
        app: image-sorter
    spec:
      imagePullSecrets:
        - name: docker-registry-auth
      containers:
        - name: image-sorter
          image: forgejo.colddev.net/coldb/image-sorter:latest@sha256:63bbe6c524c4a3ed2ac0f66798528444ebd7c6c316265e8bbf43337785d5823e
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: image-sorter-configmap-enc
          ports:
            - containerPort: 3000
