apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-sorter
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: image-sorter
  template:
    metadata:
      labels:
        app: image-sorter
    spec:
      imagePullSecrets:
        - name: docker-registry-auth
      containers:
        - name: image-sorter
          image: forgejo.colddev.net/coldb/image-sorter:latest@sha256:3c37275f9e238d87b762006613a1b53b867212e7cab544ba586473830fa8de65
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: image-sorter-configmap-enc
          ports:
            - containerPort: 3000
