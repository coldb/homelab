apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minecraft-home-data-longhorn-backup-pvc
spec:
  storageClassName: "longhorn-retain-backup"
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

