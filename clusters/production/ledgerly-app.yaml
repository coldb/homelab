apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ledgerly-migrations
  namespace: flux-system
spec:
  dependsOn:
    - name: databases
    - name: config
  interval: 1m0s
  retryInterval: 1m
  timeout: 10m
  wait: true
  force: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/production/ledgerly-migrations
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ledgerly-app
  namespace: flux-system
spec:
  dependsOn:
    - name: ledgerly-migrations
  interval: 1m0s
  retryInterval: 1m
  timeout: 5m
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/production/ledgerly-app
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
